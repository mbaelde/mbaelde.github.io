{{ define "main" }}
<div class="prose dark:prose-invert max-w-none mt-8">
    <h1 class="text-3xl font-sans font-bold mb-6 text-slate dark:text-dark-text">{{ .Title }}</h1>
    <div class="text-lg text-slate dark:text-gray-300 font-serif mb-8">
        {{ .Content }}
    </div>
    <ul class="space-y-4 list-none p-0">
        {{ range .Pages }}
        <li>
            <a href="{{ .RelPermalink }}"
                class="text-xl font-bold text-slate dark:text-dark-text hover:text-blue-500 transition-colors no-underline">{{
                .Title }}</a>
            {{ if .Description }}
            <p class="text-gray-600 dark:text-gray-400 mt-2">{{ .Description }}</p>
            {{ end }}
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
