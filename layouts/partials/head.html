<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ site.Params.description | default "" }}">

<!-- CSS via Hugo Pipes with PostCSS/Tailwind -->
{{ $css := resources.Get "css/main.css" | postCSS }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}">

<!-- KaTeX Support -->
{{ if or site.Params.math .Params.math }}
{{ partial "math.html" . }}
{{ end }}

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">

{{ if not site.IsServer }}
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QWTZE2HVCH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());

  gtag('config', 'G-QWTZE2HVCH');
</script>
{{ end }}
